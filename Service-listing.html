<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Popup Form</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">
	<style>
	body {
		font-family: Arial, sans-serif;
		background: #f5f5f5;
	}

	.popup-container-1 {
		display: flex;
		position: relative;
		background: white;
		width: 60%;
		overflow: hidden;
		text-align: center;
		justify-content: space-evenly;
		margin: auto;
	}

	.form-section-1 {
		width: 55%;
		padding: 40px;
		background: white;
		text-align: center;
		transform: translateY(30px);
	}

	.info-box-1 p {
		margin: 5px;
	}

	.form-section-1 h2 {
		color: #002D62;
		font-weight: bold;
		margin-bottom: 15px;
	}

	.form-section-1 p {
		color: #000;
		font-size: 18px;
		font-weight: bold;
		margin-bottom: 25px;
	}

	.form-section-1 input {
		width: 100%;
		padding: 15px;
		margin: 10px 0;
		border: 1px solid #ccc;
		border-radius: 5px;
		font-size: 16px;
		box-sizing: border-box;
	}

	.form-section-1 input::placeholder {
		color: #999;
	}

	.subit-btn-1 {
		background-color: #031D5A;
		color: white;
		padding: 15px;
		border: none;
		cursor: pointer;
		width: 100%;
		border-radius: 5px;
		font-size: 18px;
		font-weight: bold;
	}

	.subit-btn-1:hover {
		background-color: #004A98;
	}

	.info-section-1 {
		width: 45%;
		background: #031D5A;
		color: white;
		padding: 40px;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
	}

	.info-box-1 {
		background: rgba(255, 255, 255, 0.1);
		padding: 20px;
		margin: 15px 0;
		border-radius: 5px;
		text-align: center;
		font-size: 18px;
		font-weight: bold;
		width: 80%;
	}

	.star-icon {
		width: 40px;
		height: 40px;
		margin-bottom: 10px;
		padding: 5px;
		background: #fff;
	}

	button.close-popup {
	    color: #031D59 !important;
	    background: #fff !important;
	    font-size: 30px;
	    font-weight: 600;
	}

	.close-popup {
		position: absolute;
		top: 5px;
		right: 15px;
		background: #fff;
		border: none;
		font-size: 22px;
		cursor: pointer;
		padding: 5px 10px;
		box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
	}

	input[type="submit"] {
	    color: #fff;
	    background: #031D5A;
	}

	@media (max-width: 768px) {
		.popup-container-1 {
			display: block;
			width: 100%;
		}

		.form-section-1 {
			width: 95%;
			padding: 10px;
		}

		.info-section-1 {
			width: 100%;
			padding: 0;
		}
	}
	</style>
</head>

<body>

			<div class="info-section-1">

				<div class="info-box-1">

				</div>
				<div class="info-box-1">
					<img src="image/skyline.png" class="star-icon" alt="Skyline Icon">
					<p>5 Min From RGA Tech Park & WIPRO SEZ</p>
				</div>
			</div>
		</div>
	</div>
